<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeChef - Cook smarter with AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: #ffffff;
            color: #333333;
            line-height: 1.6;
        }

        header {
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #333333;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #0071e3;
        }

        .hero {
            max-width: 980px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #000000;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 28px;
            font-weight: 400;
            color: #666666;
            margin-bottom: 48px;
            line-height: 1.3;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .button {
            display: inline-block;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .button-primary {
            background-color: #0071e3;
            color: #ffffff;
        }

        .button-primary:hover {
            background-color: #0066cc;
        }

        .button-secondary {
            background-color: #f5f5f7;
            color: #000000;
            border: 1px solid #e5e5e7;
        }

        .button-secondary:hover {
            background-color: #eeeff2;
        }

        footer {
            background-color: #f5f5f7;
            border-top: 1px solid #e5e5e7;
            padding: 32px 20px;
            text-align: center;
            margin-top: 80px;
        }

        footer p {
            font-size: 13px;
            color: #666666;
        }

        footer a {
            color: #0071e3;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 16px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .hero p {
                font-size: 20px;
            }

            .button-group {
                flex-direction: column;
                align-items: stretch;
            }

            .button {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="./index.html" class="logo">FridgeChef</a>
            <ul class="nav-links">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./privacy.html">Privacy Policy</a></li>
                <li><a href="./terms.html">Terms of Service</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>FridgeChef</h1>
        <p>Cook smarter with AI.</p>
        <div class="button-group">
            <a href="./privacy.html" class="button button-secondary">Privacy Policy</a>
            <a href="./terms.html" class="button button-secondary">Terms of Service</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 FridgeChef. All rights reserved. | <a href="mailto:support@fridgechef.app">Contact Support</a></p>
    </footer>
</body>
</html>
